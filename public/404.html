<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page not found - toolconv</title>
  <meta name="robots" content="noindex">
  <style>
    :root { color-scheme: light; --brand: #3b5de7; --text: #111827; --muted: #4b5563; --line: #e5e7eb; --bg: #f8fafc; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--text); background: var(--bg); line-height: 1.65; }
    main { max-width: 720px; margin: 0 auto; padding: 72px 24px; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
    h1 { margin: 0 0 12px; font-size: clamp(36px, 8vw, 64px); line-height: 1.05; letter-spacing: 0; }
    p { color: var(--muted); font-size: 18px; }
    a { color: var(--brand); text-decoration: none; font-weight: 700; }
    a:hover, a:focus { text-decoration: underline; }
  </style>
</head>
<body>
  <main>
    <h1>Page not found</h1>
    <p>The page you requested does not exist. Visit the homepage to choose a working converter.</p>
    <p><a href="/">Back to toolconv</a></p>

</html>
